<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- index.html cache hint (browsers honor this only when the server doesn't
         set its own Cache-Control; GH Pages does, but it doesn't hurt). The
         actual fix for stale-deploy 404s is the script just below. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- Stale-deploy guard ─────────────────────────────────────────────────
         Hashed JS/CSS filenames change every build. If the browser is
         serving an old index.html from disk cache, it will request asset
         hashes that no longer exist on the server (→ 404). Detect that and
         force a single hard reload (?_v=timestamp bypasses cache once),
         then bail if the reload also fails (avoid infinite loops). -->
    <script>
      (function () {
        var reloaded = sessionStorage.getItem('__slide_reloaded_after_404');
        function isAssetUrl(url) {
          return typeof url === 'string' && /\/assets\/[^/]+\.(js|css|mjs)(\?|$)/.test(url);
        }
        function tryReload() {
          if (reloaded) return; // already retried this session, give up
          sessionStorage.setItem('__slide_reloaded_after_404', '1');
          var u = new URL(window.location.href);
          u.searchParams.set('_v', Date.now().toString());
          window.location.replace(u.toString());
        }
        // Catch <link rel="stylesheet"> / <script src="..."> 404s (capture phase)
        window.addEventListener('error', function (e) {
          var t = e.target;
          if (!t || t === window) return;
          var src = t.src || t.href;
          if (isAssetUrl(src)) tryReload();
        }, true);
        // Catch fetch failures for JS chunks loaded via dynamic import
        window.addEventListener('unhandledrejection', function (e) {
          var msg = e.reason && (e.reason.message || String(e.reason));
          if (msg && /Failed to fetch dynamically imported module|Loading chunk \S+ failed|Importing a module script failed/i.test(msg)) {
            tryReload();
          }
        });
        // Clear the retry flag once everything has actually loaded for ~5s
        window.addEventListener('load', function () {
          setTimeout(function () { sessionStorage.removeItem('__slide_reloaded_after_404'); }, 5000);
        });
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#4f6ef7" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Slide - La messagerie privée et sécurisée</title>
    <!-- SEO -->
    <meta name="description" content="Slide — Messagerie sécurisée, chiffrée de bout en bout. Chats, appels vocaux HD, serveurs communautaires. Gratuit." />
    <meta name="keywords" content="messagerie, chat, vocal, serveur, sécurisé, chiffrement, slide" />
    <link rel="canonical" href="__SLIDE_PUBLIC_SITE_URL__/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="__SLIDE_PUBLIC_SITE_URL__/" />
    <meta property="og:title" content="Slide — La messagerie qui respecte votre vie privée" />
    <meta property="og:description" content="Chats chiffrés, appels HD, serveurs communautaires. Gratuit pour toujours." />
    <meta property="og:image" content="__SLIDE_PUBLIC_SITE_URL__/og-image.png" />
    <meta property="og:site_name" content="Slide" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Slide — La messagerie qui respecte votre vie privée" />
    <meta name="twitter:description" content="Chats chiffrés, appels HD, serveurs communautaires. Gratuit pour toujours." />
    <meta name="twitter:image" content="__SLIDE_PUBLIC_SITE_URL__/og-image.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Favicon and apple-touch-icon above load icon.png; avoid preload to prevent "not used" warnings -->
    <style>
      /* Safe area padding for devices with notches */
      :root {
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        --safe-area-left: env(safe-area-inset-left, 0px);
        --safe-area-right: env(safe-area-inset-right, 0px);
      }
      /* Default background before CSS bundle loads — prevents white flash on reload */
      html, body { background-color: #000; margin: 0; padding: 0; }
    </style>
    <script>
      // GitHub Pages SPA fallback: restore deep-link path redirected via /404.html
      (function (l) {
        if (l.search && l.search.startsWith('?/')) {
          var decoded = l.search
            .slice(2)
            .replace(/~and~/g, '&');
          var qIndex = decoded.indexOf('&');
          var path = qIndex >= 0 ? decoded.slice(0, qIndex) : decoded;
          var query = qIndex >= 0 ? '?' + decoded.slice(qIndex + 1) : '';
          var newUrl = l.pathname + path + query + l.hash;
          window.history.replaceState(null, '', newUrl);
        }
      })(window.location);
    </script>
    <script>
      (function () {
        var theme = 'dark';
        try {
          var cached = localStorage.getItem('slide_theme_cache');
          if (cached === 'light') {
            theme = 'light';
          } else if (cached === 'dark') {
            theme = 'dark';
          } else {
            // No cache: respect OS, default to dark if no preference
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
        } catch (e) {
          theme = 'dark';
        }
        document.documentElement.setAttribute('data-theme', theme);
        // Set background immediately so reload/account-switch never shows a white flash
        document.documentElement.style.backgroundColor = theme === 'light' ? '#ffffff' : '#000000';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
