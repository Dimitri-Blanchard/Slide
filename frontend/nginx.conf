server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Never cache the shell — avoids JS referencing old hashed /assets/* after a deploy
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API requests to local backend so web app stays same-origin.
  # This avoids cross-origin/TLS issues on a broken api subdomain cert.
  location /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Cache static assets aggressively
  location ~* \.(js|css|png|jpg|ico|woff2|mp3)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Security headers
  add_header X-Frame-Options "DENY";
  add_header X-Content-Type-Options "nosniff";
  add_header Referrer-Policy "strict-origin-when-cross-origin";

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
