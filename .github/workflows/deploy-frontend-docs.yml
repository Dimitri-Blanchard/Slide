# Fallback when Pages is set to "Deploy from a branch" → main → /docs
# (root / shows README.md; /docs serves the built SPA)
name: Publish site to docs/

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-docs
  cancel-in-progress: true

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_PUBLIC_SITE_URL: ${{ vars.VITE_PUBLIC_SITE_URL || 'https://sl1de.xyz' }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_BACKEND_ORIGIN: ${{ vars.VITE_BACKEND_ORIGIN }}
          VITE_CDN_BASE_URL: ${{ vars.VITE_CDN_BASE_URL }}

      - name: SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Deploy to docs/ on main
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: frontend/dist
          target-folder: docs
          clean: true
          commit-message: deploy: frontend to docs/
